<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stories</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f5;
    --muted: rgba(240,240,245,0.45);
    --accent: #c084fc;
    --accent2: #f472b6;
    --ring: linear-gradient(135deg, #c084fc, #f472b6, #fb923c);
    --radius: 18px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ─── APP SHELL ─── */
  .app {
    width: 100%;
    max-width: 480px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  header {
    padding: 20px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    background: var(--ring);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.02em;
  }

  header span {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* ─── STORY ROW ─── */
  .stories-row {
    display: flex;
    gap: 14px;
    padding: 20px 20px 8px;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .stories-row::-webkit-scrollbar { display: none; }

  /* Add button */
  .add-btn {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
  }

  .add-ring {
    width: 66px; height: 66px;
    border-radius: 50%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    transition: transform .18s ease;
  }
  .add-btn:active .add-ring { transform: scale(.93); }
  .add-ring svg { color: var(--accent); }
  .add-ring .badge {
    position: absolute; bottom: -2px; right: -2px;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--ring);
    background: linear-gradient(135deg,#c084fc,#f472b6);
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--bg);
  }
  .add-ring .badge svg { color: #fff; }
  .add-btn span { font-size: 0.7rem; color: var(--muted); font-weight: 500; }

  /* Story thumb */
  .story-thumb {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .story-ring {
    width: 66px; height: 66px;
    border-radius: 50%;
    padding: 2.5px;
    background: var(--ring);
    background: linear-gradient(135deg, #c084fc, #f472b6, #fb923c);
    transition: transform .18s ease, opacity .18s;
  }
  .story-ring.seen {
    background: var(--border);
    background: linear-gradient(135deg, rgba(255,255,255,.15), rgba(255,255,255,.05));
  }
  .story-thumb:active .story-ring { transform: scale(.93); opacity: .8; }

  .story-ring-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    border: 2.5px solid var(--bg);
    overflow: hidden;
    background: var(--surface);
  }
  .story-ring-inner img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .story-thumb span {
    font-size: 0.7rem; color: var(--muted); font-weight: 500;
    max-width: 66px; text-align: center;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* countdown dot */
  .story-ring { position: relative; }
  .countdown-dot {
    position: absolute;
    bottom: 2px; right: 2px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #fb923c;
    border: 2px solid var(--bg);
    z-index: 2;
  }

  /* ─── EMPTY STATE ─── */
  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 60px 24px;
    text-align: center;
    opacity: 0;
    animation: fadeUp .5s .2s forwards;
  }
  .empty-icon {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 2px dashed rgba(192,132,252,.3);
    display: flex; align-items: center; justify-content: center;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .empty h2 { font-family:'DM Serif Display',serif; font-size:1.3rem; opacity:.85; }
  .empty p { font-size:.85rem; color: var(--muted); max-width: 240px; line-height:1.6; }

  /* ─── VIEWER OVERLAY ─── */
  .viewer {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    touch-action: pan-y;
    user-select: none;
  }
  .viewer.hidden { display: none; }

  /* progress bars */
  .progress-bar-row {
    position: absolute;
    top: env(safe-area-inset-top, 12px);
    left: 12px; right: 12px;
    display: flex;
    gap: 4px;
    z-index: 10;
    padding-top: 8px;
  }
  .prog-seg {
    flex: 1; height: 2.5px;
    background: rgba(255,255,255,.25);
    border-radius: 99px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    background: #fff;
    width: 0%;
    transition: width linear;
  }
  .prog-fill.done { width: 100%; transition: none; }

  /* viewer header */
  .viewer-header {
    position: absolute;
    top: calc(env(safe-area-inset-top, 12px) + 20px);
    left: 16px; right: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 10;
  }
  .viewer-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    overflow: hidden; border: 2px solid rgba(255,255,255,.4);
  }
  .viewer-avatar img { width:100%;height:100%;object-fit:cover; }
  .viewer-meta { flex:1; }
  .viewer-meta .name { font-size:.82rem; font-weight:600; color:#fff; }
  .viewer-meta .time { font-size:.72rem; color:rgba(255,255,255,.6); }
  .viewer-close {
    background: none; border: none; cursor: pointer;
    color: rgba(255,255,255,.8); padding: 4px;
    -webkit-tap-highlight-color: transparent;
  }
  .viewer-close:active { opacity: .6; }

  /* main image */
  .viewer-img-wrap {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .viewer-img-wrap img {
    width: 100%; height: 100%;
    object-fit: contain;
    animation: storyIn .3s ease;
  }

  /* tap zones */
  .tap-zone {
    position: absolute;
    top: 0; bottom: 0;
    width: 38%;
    z-index: 9;
    cursor: pointer;
  }
  .tap-prev { left: 0; }
  .tap-next { right: 0; }

  /* delete btn */
  .delete-btn {
    position: absolute;
    bottom: calc(env(safe-area-inset-bottom, 20px) + 24px);
    left: 50%; transform: translateX(-50%);
    background: rgba(255,50,80,.18);
    border: 1px solid rgba(255,80,100,.3);
    color: #ff6080;
    border-radius: 99px;
    padding: 8px 20px;
    font-size: .8rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    z-index: 10;
    backdrop-filter: blur(8px);
    -webkit-tap-highlight-color: transparent;
    transition: background .15s;
  }
  .delete-btn:active { background: rgba(255,50,80,.3); }

  /* ─── DIVIDER ─── */
  .divider {
    margin: 0 20px;
    border: none;
    border-top: 1px solid var(--border);
  }

  /* ─── FEED PLACEHOLDER ─── */
  .feed-hint {
    padding: 28px 20px 0;
  }
  .feed-hint p {
    font-size: .7rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin-bottom: 16px;
    font-weight: 600;
  }
  .skeleton-card {
    height: 220px;
    border-radius: var(--radius);
    background: var(--surface);
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }
  .skeleton-card::after {
    content:'';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 30%, rgba(255,255,255,.03) 50%, transparent 70%);
    background-size: 200% 100%;
    animation: shimmer 1.6s infinite;
  }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to { opacity:1; transform:translateY(0); }
  }
  @keyframes storyIn {
    from { opacity:0; transform:scale(1.04); }
    to { opacity:1; transform:scale(1); }
  }
  @keyframes shimmer {
    from { background-position: 200% 0; }
    to { background-position: -200% 0; }
  }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(30,30,40,.95);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 10px 20px;
    font-size: .82rem;
    font-weight: 500;
    backdrop-filter: blur(12px);
    transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
    z-index: 200;
    opacity: 0;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<div class="app" id="app">
  <header>
    <h1>Stories</h1>
    <span id="story-count">0 active</span>
  </header>

  <div class="stories-row" id="stories-row">
    <!-- Add button -->
    <button class="add-btn" id="add-btn" title="Add story">
      <div class="add-ring">
        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="4"/><path d="M9 12h6M12 9v6"/>
        </svg>
        <div class="badge">
          <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        </div>
      </div>
      <span>Your story</span>
    </button>
    <!-- Story thumbs injected here -->
  </div>

  <hr class="divider">

  <div class="empty" id="empty-state">
    <div class="empty-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>
      </svg>
    </div>
    <h2>No stories yet</h2>
    <p>Tap the <strong>+</strong> button to share a moment that vanishes in 24 hours.</p>
  </div>

  <div class="feed-hint" id="feed-hint" style="display:none">
    <p>Recent posts</p>
    <div class="skeleton-card"></div>
    <div class="skeleton-card" style="height:160px;opacity:.6"></div>
  </div>
</div>

<!-- Viewer overlay -->
<div class="viewer hidden" id="viewer">
  <div class="progress-bar-row" id="prog-row"></div>
  <div class="viewer-header">
    <div class="viewer-avatar"><img id="v-avatar" src="" alt=""></div>
    <div class="viewer-meta">
      <div class="name" id="v-name">You</div>
      <div class="time" id="v-time"></div>
    </div>
    <button class="viewer-close" id="v-close">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="viewer-img-wrap" id="viewer-img-wrap">
    <img id="viewer-img" src="" alt="Story">
  </div>
  <div class="tap-zone tap-prev" id="tap-prev"></div>
  <div class="tap-zone tap-next" id="tap-next"></div>
  <button class="delete-btn" id="delete-btn">🗑 Delete this story</button>
</div>

<!-- Hidden file input -->
<input type="file" id="file-input" accept="image/*" style="display:none">

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'maitra_stories_v1';
const TTL = 24 * 60 * 60 * 1000; // 24 hours
const STORY_DURATION = 3000; // ms per story in viewer

/* ── Storage helpers ── */
function loadStories() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    const now = Date.now();
    return arr.filter(s => now - s.createdAt < TTL);
  } catch { return []; }
}

function saveStories(stories) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(stories));
}

function addStory(base64) {
  const stories = loadStories();
  const story = {
    id: crypto.randomUUID(),
    img: base64,
    createdAt: Date.now(),
    seen: false
  };
  stories.unshift(story);
  saveStories(stories);
  return story;
}

function deleteStory(id) {
  const stories = loadStories().filter(s => s.id !== id);
  saveStories(stories);
}

function markSeen(id) {
  const stories = loadStories();
  const s = stories.find(s => s.id === id);
  if (s) { s.seen = true; saveStories(stories); }
}

/* ── Time helpers ── */
function timeAgo(ts) {
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  return `${h}h ago`;
}

function expiresIn(ts) {
  const rem = TTL - (Date.now() - ts);
  const h = Math.floor(rem / 3600000);
  const m = Math.floor((rem % 3600000) / 60000);
  if (h > 0) return `expires in ${h}h ${m}m`;
  return `expires in ${m}m`;
}

/* ── Image resizing ── */
function resizeImage(file) {
  return new Promise((resolve) => {
    const MAX_W = 1080, MAX_H = 1920;
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > MAX_W || h > MAX_H) {
        const ratio = Math.min(MAX_W / w, MAX_H / h);
        w = Math.round(w * ratio); h = Math.round(h * ratio);
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/jpeg', 0.82));
    };
    img.src = url;
  });
}

/* ── Toast ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

/* ── Render story row ── */
function render() {
  const stories = loadStories();
  const row = document.getElementById('stories-row');
  // Remove old thumbs (keep add-btn which is first child)
  [...row.children].slice(1).forEach(el => el.remove());

  stories.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'story-thumb';
    div.dataset.id = s.id;
    div.innerHTML = `
      <div class="story-ring${s.seen ? ' seen' : ''}">
        <div class="story-ring-inner">
          <img src="${s.img}" alt="Story ${i+1}" loading="lazy">
        </div>
      </div>
      <span>${timeAgo(s.createdAt)}</span>
    `;
    // warn if < 2h left
    const rem = TTL - (Date.now() - s.createdAt);
    if (rem < 2 * 3600000) {
      const dot = document.createElement('div');
      dot.className = 'countdown-dot';
      dot.title = expiresIn(s.createdAt);
      div.querySelector('.story-ring').appendChild(dot);
    }
    div.addEventListener('click', () => openViewer(i));
    row.appendChild(div);
  });

  const count = document.getElementById('story-count');
  count.textContent = stories.length === 0 ? '0 active' : `${stories.length} active`;

  document.getElementById('empty-state').style.display = stories.length ? 'none' : 'flex';
  document.getElementById('feed-hint').style.display = stories.length ? 'block' : 'none';
}

/* ── Viewer ── */
let viewerIdx = 0;
let viewerStories = [];
let progInterval = null;
let progStart = null;
let progDuration = STORY_DURATION;

function openViewer(idx) {
  viewerStories = loadStories();
  viewerIdx = idx;
  document.getElementById('viewer').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
  showStory(viewerIdx);
}

function closeViewer() {
  document.getElementById('viewer').classList.add('hidden');
  document.body.style.overflow = '';
  clearInterval(progInterval);
  render();
}

function buildProgressBars() {
  const row = document.getElementById('prog-row');
  row.innerHTML = '';
  viewerStories.forEach((_, i) => {
    const seg = document.createElement('div');
    seg.className = 'prog-seg';
    const fill = document.createElement('div');
    fill.className = 'prog-fill' + (i < viewerIdx ? ' done' : '');
    seg.appendChild(fill);
    row.appendChild(seg);
  });
}

function showStory(idx) {
  clearInterval(progInterval);
  viewerIdx = idx;
  if (idx < 0 || idx >= viewerStories.length) { closeViewer(); return; }

  const s = viewerStories[idx];
  markSeen(s.id);

  document.getElementById('viewer-img').src = s.img;
  document.getElementById('v-avatar').src = s.img;
  document.getElementById('v-time').textContent = `${timeAgo(s.createdAt)} · ${expiresIn(s.createdAt)}`;

  buildProgressBars();

  // Animate current bar
  const fills = document.querySelectorAll('.prog-fill');
  progStart = Date.now();
  let el = fills[idx];
  if (!el) return;

  progInterval = setInterval(() => {
    const elapsed = Date.now() - progStart;
    const pct = Math.min((elapsed / STORY_DURATION) * 100, 100);
    el.style.width = pct + '%';
    el.style.transition = 'none';
    if (pct >= 100) { clearInterval(progInterval); showStory(idx + 1); }
  }, 30);
}

function prevStory() { showStory(viewerIdx - 1); }
function nextStory() { showStory(viewerIdx + 1); }

/* ── Swipe support ── */
let touchStartX = 0, touchStartY = 0;
const viewer = document.getElementById('viewer');
viewer.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
viewer.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    dx < 0 ? nextStory() : prevStory();
  }
}, { passive: true });

document.getElementById('tap-prev').addEventListener('click', prevStory);
document.getElementById('tap-next').addEventListener('click', nextStory);
document.getElementById('v-close').addEventListener('click', closeViewer);
document.getElementById('delete-btn').addEventListener('click', () => {
  const s = viewerStories[viewerIdx];
  deleteStory(s.id);
  viewerStories = loadStories();
  if (viewerStories.length === 0) { closeViewer(); showToast('Story deleted'); return; }
  viewerIdx = Math.min(viewerIdx, viewerStories.length - 1);
  showStory(viewerIdx);
  showToast('Story deleted');
});

/* ── File upload ── */
document.getElementById('add-btn').addEventListener('click', () => {
  document.getElementById('file-input').click();
});

document.getElementById('file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';

  if (!file.type.startsWith('image/')) { showToast('Please pick an image'); return; }
  if (file.size > 20 * 1024 * 1024) { showToast('Image too large (max 20 MB)'); return; }

  showToast('Adding story…');
  try {
    const base64 = await resizeImage(file);
    addStory(base64);
    render();
    showToast('Story added! Expires in 24h ✨');
  } catch (err) {
    console.error(err);
    showToast('Could not add story');
  }
});

/* ── Keyboard shortcuts ── */
document.addEventListener('keydown', e => {
  if (document.getElementById('viewer').classList.contains('hidden')) return;
  if (e.key === 'ArrowRight') nextStory();
  if (e.key === 'ArrowLeft') prevStory();
  if (e.key === 'Escape') closeViewer();
});

/* ── Purge expired stories periodically ── */
setInterval(() => { saveStories(loadStories()); render(); }, 60 * 1000);

/* ── Init ── */
render();
</script>
</body>
</html>
